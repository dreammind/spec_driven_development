# Git ブランチ運用拡張の設定
# インストール時に .specify/extensions/git/git-config.yml へコピーされます

# ブランチ採番戦略: "sequential" (001, 002, ...) または "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# リポジトリ初期化時に `git commit` で使用するコミットメッセージ
init_commit_message: "[Spec Kit] 初期コミット"

# コアコマンドの前後で自動コミットを実行します。
# 全体有効化は "default" を設定し、必要に応じてコマンド単位で上書きします。
# 各キーの enabled は true/false。message はコマンド単位でカスタマイズ可能です。
auto_commit:
  default: false
  before_clarify:
    enabled: false
    message: "[Spec Kit] 明確化前に進捗を保存"
  before_plan:
    enabled: false
    message: "[Spec Kit] 計画前に進捗を保存"
  before_tasks:
    enabled: false
    message: "[Spec Kit] タスク生成前に進捗を保存"
  before_implement:
    enabled: false
    message: "[Spec Kit] 実装前に進捗を保存"
  before_checklist:
    enabled: false
    message: "[Spec Kit] チェックリスト前に進捗を保存"
  before_analyze:
    enabled: false
    message: "[Spec Kit] 分析前に進捗を保存"
  before_taskstoissues:
    enabled: false
    message: "[Spec Kit] Issue 同期前に進捗を保存"
  after_constitution:
    enabled: false
    message: "[Spec Kit] プロジェクト憲章を追加"
  after_specify:
    enabled: false
    message: "[Spec Kit] 仕様を追加"
  after_clarify:
    enabled: true
    message: "[Spec Kit] 仕様を明確化"
  after_plan:
    enabled: false
    message: "[Spec Kit] 実装計画を追加"
  after_tasks:
    enabled: false
    message: "[Spec Kit] タスクを追加"
  after_implement:
    enabled: false
    message: "[Spec Kit] 実装の進捗"
  after_checklist:
    enabled: false
    message: "[Spec Kit] チェックリストを追加"
  after_analyze:
    enabled: false
    message: "[Spec Kit] 分析レポートを追加"
  after_taskstoissues:
    enabled: false
    message: "[Spec Kit] タスクを Issue に同期"
