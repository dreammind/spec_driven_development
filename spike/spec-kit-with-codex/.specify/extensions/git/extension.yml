schema_version: "1.0"

extension:
  id: git
  name: "Git ブランチ運用"
  version: "1.0.0"
  description: "機能ブランチ作成、採番（連番/タイムスタンプ）、検証、Git リモート検出"
  author: spec-kit-core
  repository: https://github.com/github/spec-kit
  license: MIT

requires:
  speckit_version: ">=0.2.0"
  tools:
    - name: git
      required: false

provides:
  commands:
    - name: speckit.git.feature
      file: commands/speckit.git.feature.md
      description: "連番またはタイムスタンプ形式で機能ブランチを作成"
    - name: speckit.git.validate
      file: commands/speckit.git.validate.md
      description: "現在のブランチが機能ブランチ命名規約に従っているか検証"
    - name: speckit.git.remote
      file: commands/speckit.git.remote.md
      description: "GitHub 連携用に Git リモート URL を検出"
    - name: speckit.git.initialize
      file: commands/speckit.git.initialize.md
      description: "初回コミット付きで Git リポジトリを初期化"
    - name: speckit.git.commit
      file: commands/speckit.git.commit.md
      description: "Spec Kit コマンド完了後に変更を自動コミット"

  config:
    - name: "git-config.yml"
      template: "config-template.yml"
      description: "Git ブランチ運用設定"
      required: false

hooks:
  before_constitution:
    command: speckit.git.initialize
    optional: false
    description: "憲章セットアップ前に Git リポジトリを初期化"
  before_specify:
    command: speckit.git.feature
    optional: false
    description: "仕様作成前に機能ブランチを作成"
  before_clarify:
    command: speckit.git.commit
    optional: true
    prompt: "明確化の前に未コミット変更をコミットしますか？"
    description: "仕様明確化前の自動コミット"
  before_plan:
    command: speckit.git.commit
    optional: true
    prompt: "計画作成の前に未コミット変更をコミットしますか？"
    description: "実装計画前の自動コミット"
  before_tasks:
    command: speckit.git.commit
    optional: true
    prompt: "タスク生成の前に未コミット変更をコミットしますか？"
    description: "タスク生成前の自動コミット"
  before_implement:
    command: speckit.git.commit
    optional: true
    prompt: "実装の前に未コミット変更をコミットしますか？"
    description: "実装前の自動コミット"
  before_checklist:
    command: speckit.git.commit
    optional: true
    prompt: "チェックリスト作成の前に未コミット変更をコミットしますか？"
    description: "チェックリスト生成前の自動コミット"
  before_analyze:
    command: speckit.git.commit
    optional: true
    prompt: "分析の前に未コミット変更をコミットしますか？"
    description: "分析前の自動コミット"
  before_taskstoissues:
    command: speckit.git.commit
    optional: true
    prompt: "Issue 同期の前に未コミット変更をコミットしますか？"
    description: "タスクから Issue 変換前の自動コミット"
  after_constitution:
    command: speckit.git.commit
    optional: true
    prompt: "憲章の変更をコミットしますか？"
    description: "憲章更新後の自動コミット"
  after_specify:
    command: speckit.git.commit
    optional: true
    prompt: "仕様の変更をコミットしますか？"
    description: "仕様作成後の自動コミット"
  after_clarify:
    command: speckit.git.commit
    optional: true
    prompt: "明確化の変更をコミットしますか？"
    description: "仕様明確化後の自動コミット"
  after_plan:
    command: speckit.git.commit
    optional: true
    prompt: "計画の変更をコミットしますか？"
    description: "実装計画後の自動コミット"
  after_tasks:
    command: speckit.git.commit
    optional: true
    prompt: "タスクの変更をコミットしますか？"
    description: "タスク生成後の自動コミット"
  after_implement:
    command: speckit.git.commit
    optional: true
    prompt: "実装の変更をコミットしますか？"
    description: "実装後の自動コミット"
  after_checklist:
    command: speckit.git.commit
    optional: true
    prompt: "チェックリストの変更をコミットしますか？"
    description: "チェックリスト生成後の自動コミット"
  after_analyze:
    command: speckit.git.commit
    optional: true
    prompt: "分析結果をコミットしますか？"
    description: "分析後の自動コミット"
  after_taskstoissues:
    command: speckit.git.commit
    optional: true
    prompt: "Issue 同期後の変更をコミットしますか？"
    description: "タスクから Issue 変換後の自動コミット"

tags:
  - "git"
  - "branching"
  - "workflow"

config:
  defaults:
    branch_numbering: sequential
    init_commit_message: "[Spec Kit] 初期コミット"
