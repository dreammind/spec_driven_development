installed: []
settings:
  auto_execute_hooks: true
hooks:
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: speckit.git.initialize を実行しますか？
    description: 憲章セットアップ前に Git リポジトリを初期化
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: speckit.git.feature を実行しますか？
    description: 仕様作成前に機能ブランチを作成
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: 明確化の前に未コミット変更をコミットしますか？
    description: 仕様明確化前の自動コミット
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: 計画作成の前に未コミット変更をコミットしますか？
    description: 実装計画前の自動コミット
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: タスク生成の前に未コミット変更をコミットしますか？
    description: タスク生成前の自動コミット
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: 実装の前に未コミット変更をコミットしますか？
    description: 実装前の自動コミット
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: チェックリスト作成の前に未コミット変更をコミットしますか？
    description: チェックリスト生成前の自動コミット
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: 分析の前に未コミット変更をコミットしますか？
    description: 分析前の自動コミット
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Issue 同期の前に未コミット変更をコミットしますか？
    description: タスクから Issue 変換前の自動コミット
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: 憲章の変更をコミットしますか？
    description: 憲章更新後の自動コミット
    condition: null
  after_specify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: 仕様の変更をコミットしますか？
    description: 仕様作成後の自動コミット
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: 明確化の変更をコミットしますか？
    description: 仕様明確化後の自動コミット
    condition: null
  after_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: 計画の変更をコミットしますか？
    description: 実装計画後の自動コミット
    condition: null
  after_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: タスクの変更をコミットしますか？
    description: タスク生成後の自動コミット
    condition: null
  after_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: 実装の変更をコミットしますか？
    description: 実装後の自動コミット
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: チェックリストの変更をコミットしますか？
    description: チェックリスト生成後の自動コミット
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: 分析結果をコミットしますか？
    description: 分析後の自動コミット
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Issue 同期後の変更をコミットしますか？
    description: タスクから Issue 変換後の自動コミット
    condition: null
